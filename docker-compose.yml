services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reporting
      POSTGRES_PASSWORD: reporting
      POSTGRES_DB: reporting
    ports:
      - "5432:5432"
    volumes:
      - reporting_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reporting_db_data:
